# BOYA Agent Nginx site config (example)
# Place at: /etc/nginx/sites-available/boya-agent
# Enable with: ln -s /etc/nginx/sites-available/boya-agent /etc/nginx/sites-enabled/boya-agent

server {
    listen 80;
    server_name buaayqq.eu.cc www.buaayqq.eu.cc 49.233.248.86;

    client_max_body_size 10m;

    # Flask app
    set $boya_upstream http://127.0.0.1:5000;

    # Public entry points: do NOT require Basic Auth
    location = /subscribe {
        auth_basic off;
        proxy_pass $boya_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /portal {
        auth_basic off;
        proxy_pass $boya_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        auth_basic off;
        proxy_pass $boya_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        auth_basic off;
        proxy_pass $boya_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin endpoints: protected by Basic Auth
    location / {
        auth_basic "Admin Login";
        auth_basic_user_file /etc/nginx/.htpasswd_boya;

        proxy_pass $boya_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
